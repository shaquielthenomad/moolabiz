services:
    postgres_db:
        image: postgres:16-alpine
        volumes:
            - postgres_db_data:/var/lib/postgresql/data
        ports:
            - "6543:5432"
        environment:
            POSTGRES_DB: vendure
            POSTGRES_USER: vendure
            POSTGRES_PASSWORD: ${DB_PASSWORD:-vendure_secret}
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U vendure -d vendure"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s
        restart: unless-stopped
        labels:
            - "io.vendure.create.name=vendure-store"

    redis:
        image: redis:7-alpine
        ports:
            - "6479:6379"
        volumes:
            - redis_data:/data
        restart: unless-stopped
        labels:
            - "io.vendure.create.name=vendure-store"

volumes:
    postgres_db_data:
        driver: local
        labels:
            - "io.vendure.create.name=vendure-store"
    redis_data:
        driver: local
        labels:
            - "io.vendure.create.name=vendure-store"
