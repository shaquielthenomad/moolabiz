services:
  catalog:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.bot
    ports:
      - "3000:3000"
    environment:
      - BUSINESS_NAME=${BUSINESS_NAME}
      - BUSINESS_SLUG=${BUSINESS_SLUG}
      - WHATSAPP_NUMBER=${WHATSAPP_NUMBER}
      - PAYMENT_PROVIDER=${PAYMENT_PROVIDER}
      - API_SECRET=${API_SECRET}
      - DB_PATH=/data/store.db
    volumes:
      - catalog_data:/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  ollama:
    image: ollama/ollama:0.6
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: "1"
    command: sh -c "ollama serve & sleep 5 && (ollama list | grep -q llama3.2:1b || ollama pull llama3.2:1b) && wait"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

volumes:
  catalog_data:
  ollama_data:
